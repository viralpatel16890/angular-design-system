<div [class]="hostClass()">
  @for (item of items(); track item.id) {
    <div
      class="ds-accordion__item"
      [class.ds-accordion__item--expanded]="isExpanded(item)"
      [class.ds-accordion__item--disabled]="item.disabled"
    >
      <button
        type="button"
        class="ds-accordion__trigger"
        [id]="triggerId(item.id)"
        [attr.aria-expanded]="isExpanded(item)"
        [attr.aria-controls]="panelId(item.id)"
        [attr.aria-disabled]="item.disabled ? 'true' : null"
        [disabled]="item.disabled"
        (click)="toggle(item)"
      >
        <span class="ds-accordion__trigger-label">{{ item.title }}</span>
        <svg
          class="ds-accordion__chevron"
          [class.ds-accordion__chevron--open]="isExpanded(item)"
          width="16" height="16" viewBox="0 0 16 16" fill="none"
          aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div
        class="ds-accordion__panel"
        [id]="panelId(item.id)"
        role="region"
        [attr.aria-labelledby]="triggerId(item.id)"
        [class.ds-accordion__panel--open]="isExpanded(item)"
      >
        <div class="ds-accordion__panel-inner">{{ item.content }}</div>
      </div>
    </div>
  }
</div>
