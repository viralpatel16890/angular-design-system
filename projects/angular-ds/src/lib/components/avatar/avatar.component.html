<div [class]="hostClasses()" [attr.aria-label]="alt() || name() || 'Avatar'" role="img">
  @if (showImage()) {
    <img
      class="ds-avatar__img"
      [src]="src()"
      [alt]="alt() || name()"
      (error)="onImgError()"
    />
  } @else if (showInitials()) {
    <span class="ds-avatar__initials" aria-hidden="true">{{ initials() }}</span>
  } @else {
    <svg class="ds-avatar__fallback-icon" viewBox="0 0 24 24" fill="none"
      xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="9"
        fill="currentColor" opacity="0.12"/>
      <circle cx="12" cy="9.5" r="3"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M5.5 19.5c.55-3.07 3.36-5 6.5-5s5.95 1.93 6.5 5"
        stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  }

  @if (status()) {
    <span class="ds-avatar__status ds-avatar__status--{{ status() }}" aria-hidden="true"></span>
  }
</div>
