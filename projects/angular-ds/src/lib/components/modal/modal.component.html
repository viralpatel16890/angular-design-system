<dialog
  #dialogEl
  [class]="dialogClasses()"
  [attr.aria-labelledby]="title() ? 'ds-modal-title' : null"
  (click)="onBackdropClick($event)"
>
  <div class="ds-modal__panel" role="document">
    <!-- Header -->
    @if (title() || !hideClose()) {
      <header class="ds-modal__header">
        @if (title()) {
          <h2 class="ds-modal__title" id="ds-modal-title">{{ title() }}</h2>
        } @else {
          <div></div>
        }
        @if (!hideClose()) {
          <button
            class="ds-modal__close"
            type="button"
            aria-label="Close dialog"
            (click)="close()"
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        }
      </header>
    }

    <!-- Body -->
    <div class="ds-modal__body">
      <ng-content />
    </div>

    <!-- Footer (optional slot) -->
    <ng-content select="[slot=footer], ds-modal-footer" />
  </div>
</dialog>
